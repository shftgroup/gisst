default_install_hook_types: [pre-commit, pre-push]
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0  # Use the ref you want to point at
    hooks:
    - id: trailing-whitespace
    - id: check-added-large-files
    - id: check-case-conflict
    - id: check-executables-have-shebangs
    - id: check-illegal-windows-names
    - id: check-json
    - id: check-merge-conflict
    - id: check-symlinks
    - id: check-toml
    - id: check-yaml
    - id: forbid-submodules
    - id: mixed-line-ending
    - id: no-commit-to-branch
      args: [--branch, main]
  - repo: https://code.forgejo.org/forgejo/runner
    rev: v11.1.1
    hooks:
    - id: forgejo-runner-validate
  - repo: local
    hooks:
      - id: sqlx
        name: sqlx
        description: Check that sqlx prepare has been run
        entry: hooks/backend-sqlx.sh
        language: unsupported_script
        files: ^backend/
        types_or: [sql, rust]
        pass_filenames: false
      - id: rustfmt
        name: rustfmt
        description: Check if all files follow the rustfmt style
        entry: hooks/backend-rustfmt.sh
        language: unsupported_script
        pass_filenames: false
        files: ^backend/
        types_or: [rust,toml]
        stages: [pre-push]
      - id: clippy
        name: clippy
        description: Run clippy
        entry: hooks/backend-clippy.sh
        language: unsupported_script
        pass_filenames: false
        files: ^backend/
        types_or: [rust,toml]
        stages: [pre-push]
      - id: udeps
        name: cargo udeps
        description: Run cargo-udeps
        entry: hooks/cargo-udeps.sh
        language: unsupported_script
        pass_filenames: false
        files: ^backend/
        types_or: [rust,toml]
        stages: [pre-push]
      - id: cargo-audit
        name: cargo audit
        description: Run cargo-audit
        entry: hooks/cargo-audit.sh
        language: unsupported_script
        pass_filenames: false
        files: ^backend/
        types_or: [rust,toml]
        stages: [pre-push]
      - id: frontend-check
        name: frontend check
        description: Run frontend checks
        language: unsupported_script
        entry: hooks/frontend-check.sh
        files: ^frontend/
        stages: [pre-push]
      - id: trufflehog
        name: TruffleHog
        description: Detect secrets in your data.
        entry: bash -c 'trufflehog git --no-update --exclude-paths .trufflehogignore file://.'
        language: unsupported
        stages: ["pre-commit", "pre-push"]
