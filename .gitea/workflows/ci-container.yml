name: Rebuild Containers

on:
  push:
    branches: [ "main" ]
    paths:
      - frontend/package-lock.json
      - backend/Cargo.lock
      - Dockerfile.dev
      - Dockerfile.ci

env:
  CARGO_TERM_COLOR: always

jobs:
  ci-container:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Login to registry
      uses: docker/login-action@v4
      with:
        username: jcoa2018
        password: ${{ secrets.REGISTRY_TOKEN }}
        registry: cafe.cs.pomona.edu
    - name: Rebuild ci container (setup buildx)
      uses: docker/setup-buildx-action@v2
    - name: Rebuild ci container (build container)
      uses: docker/build-push-action@v4
      with:
        context: .
        file: "Dockerfile.ci"
        tags: "cafe.cs.pomona.edu/shftgroup/gisst-ci:latest"
        load: true
        cache-from: type=gha
        cache-to: type=gha,mode=max
        push: true
  devcontainer:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Login to registry
      uses: docker/login-action@v4
      with:
        username: jcoa2018
        password: ${{ secrets.REGISTRY_TOKEN }}
        registry: cafe.cs.pomona.edu
    - name: Rebuild devcontainer (setup buildx)
      uses: docker/setup-buildx-action@v2
    - name: Rebuild devcontainer (build container)
      uses: docker/build-push-action@v4
      with:
        context: .
        file: "Dockerfile.dev"
        tags: "cafe.cs.pomona.edu/shftgroup/gisst-dev:latest"
        load: true
        cache-from: type=gha
        cache-to: type=gha,mode=max
        push: true

