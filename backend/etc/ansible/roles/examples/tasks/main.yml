---
- name: Download dependencies
  apt:
    state: latest
    name:
      - zsh
- name: Find correct paths
  set_fact:
    gisst_pwd: "{{ (gisst_server_environment == 'development') | ternary(gisst_server_home+'/repo/backend', gisst_server_home) }}"
- name: Debug
  debug:
    msg: "GSE {{ gisst_server_environment }} GSU {{ gisst_server_user }} GSH {{ gisst_server_home }} PWD {{ gisst_pwd }}"
# TODO: Download these from github release
- name: Copy example files
  when: gisst_server_environment != 'development'
  copy:
    src: ../../../../examples
    dest: "{{ gisst_pwd }}/"
- name: Template load_examples script
  template:
    src: templates/load_examples.sh.j2
    dest: "{{ gisst_pwd }}/load_examples_ans.sh"
    mode: "0700"
    owner: "{{ gisst_server_user }}"
- name: Run load_examples script
  become_user: "{{ gisst_server_user }}"
  command:
    chdir: "{{ gisst_pwd }}"
    cmd: "./load_examples_ans.sh"
